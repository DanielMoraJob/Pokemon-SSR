<div class="w-full px-2 sm:px-4">

  <div class="grid gap-3 sm:gap-4 md:gap-5 lg:gap-6
              grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">

    @for (pokemon of pokemons(); track pokemon.id) {
      <app-pokemon-card [pokemon]="pokemon"></app-pokemon-card>
    }

    @if (false) {
      <div class="col-span-full text-center h-32 flex flex-col justify-center items-center text-gray-500">
        <p class="text-base sm:text-lg font-medium">No hay pokémons</p>
        <span class="text-xs sm:text-sm">Intenta buscar o recargar</span>
      </div>
    }

  </div>

</div>
